<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Noir ZK Recovery Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        button { cursor: pointer; padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Noir ZK Recovery</h1>
    
    <div class="box">
        <h3>Step 1: Registration</h3>
        <p>This generates a secret in your browser and registers its hash.</p>
        <button id="registerBtn">Register Device Secret</button>
        <p id="regStatus"></p>
    </div>

    <div class="box">
        <h3>Step 2: Recovery (Dead Man Switch)</h3>
        <p>Prove you know the secret without sending it to the server.</p>
        <button id="recoverBtn">Start ZK Recovery</button>
        <p id="recStatus"></p>
    </div>

    <h3>Debug Log</h3>
    <pre id="log"></pre>

    <script type="module" src="/main.js"></script>
</body>
</html>
