version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    ignore:
      # actions-netlify v4 runs on node24 and fails the Netlify deploy with
      # "Error: Not Found" (see #12940). Stay on v3 until upstream is fixed.
      - dependency-name: "nwtgck/actions-netlify"
        versions: [ ">=4.0.0" ]
    groups:
      # group updates for core GitHub Actions
      core-actions:
        patterns:
          - "actions/**"

  # Maintain dependencies for Rust crates
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      codespan:
        patterns:
          - "codespan"
          - "codespan-*"
      arkworks:
        patterns:
          - "ark-*"

  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    # Check the npm registry for updates every Monday
    schedule:
      interval: "weekly"
    ignore:
      # @types/node major version matches Node.js major version
      # Keep compatible with our minimum supported Node version (22.x)
      - dependency-name: "@types/node"
        versions: [ ">=23.0.0" ]
      # Ignore updates for @aztec/bb.js as it's managed separately
      - dependency-name: "@aztec/bb.js"
    groups:
      # group updates for linter
      linter:
        patterns:
          - "eslint*"
          - "@eslint/**"
          - "@typescript-eslint/**"
          - "prettier"
      docusaurus:
        patterns:
          - "@docusaurus/**"
          - "docusaurus*"
      webpack:
        patterns:
          - "webpack"
          - "*-webpack-plugin"
      typedoc:
        patterns:
          - "typedoc*"
      react:
        patterns:
          - "react"
          - "react-dom"
      hardhat:
        patterns:
          - "hardhat"
          - "@nomicfoundation/hardhat*"
          - "ethers"
      testing:
        patterns:
          - "chai"
          - "@esm-bundle/chai"
          - "mocha*"
          - "sinon"
          - "@types/chai"
          - "@types/mocha*"
          - "@types/sinon"
