name: Deploy preview for PR

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  add_label:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    outputs:
      has_label: ${{ steps.check-labels.outputs.result }}
    steps:
      - name: Check if label is present
        id: check-labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            if (labels.includes('documentation')) {
              return true;
            }

            // Fetch the list of files changed in the PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            // Check if any file is within the 'docs' folder
            const docsChanged = files.some(file => file.filename.startsWith('docs/'));
            return docsChanged;

      - name: Add label if not present
        if: steps.check-labels.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            if (!labels.includes('documentation')) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['documentation']
              })
            }

  check_no_include_code:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check for unprocessed include_code directives in versioned docs
        run: |
          if grep -r 'include_code' docs/versioned_docs/; then
            echo "::error::Found include_code directives in versioned_docs. See docs/README.md#cutting-a-new-version for how to correctly cut a versioned docs snapshot."
            exit 1
          fi

  build_preview:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: x86_64-unknown-linux-gnu
          cache-on-failure: false
          save-if: false

      - name: Install Repo Yarn's Dependencies
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.15.0'
          cache: 'yarn'
          cache-dependency-path: 'docs/yarn.lock'
      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Query active docs versions
        working-directory: docs
        run: yarn version::stables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs
        working-directory: docs
        env:
          ENV: staging # not really a secret, it will show in the footer anyway
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs
          path: ./docs/build/
          retention-days: 3

  deploy_preview:
    needs: [build_preview, add_label]
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    if: needs.add_label.outputs.has_label == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs
          path: ./docs/build

      - name: Deploy preview to Netlify
        id: netlify
        run: |
          # Run from a directory outside the repository so netlify-cli does not
          # treat noir's package.json workspaces as a monorepo and prompt for a
          # project to deploy. The prebuilt docs are passed via an absolute --dir.
          cd "$(mktemp -d)"
          npx --yes netlify-cli@26.1.0 deploy \
            --dir "$GITHUB_WORKSPACE/docs/build" \
            --no-build \
            --message "Deploy preview for PR ${{ github.event.number }}" \
            --json > netlify-deploy.json
          echo "deploy-url=$(jq -r '.deploy_url' netlify-deploy.json)" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 15

      - name: Comment preview URL on the PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = ${{ toJSON(steps.netlify.outputs.deploy-url) }};
            const marker = '<!-- netlify-docs-preview -->';
            const body = `${marker}\n🚀 Docs preview for this PR: ${url}`;
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Could not post the preview URL comment: ${error.message}`);
            }
