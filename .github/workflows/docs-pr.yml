name: Deploy preview for PR

on:
  pull_request:
  merge_group:

permissions: {}

jobs:
  add_label:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    outputs:
      has_label: ${{ steps.check-labels.outputs.result }}
    steps:
      - name: Check if label is present
        id: check-labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            if (labels.includes('documentation')) {
              return true;
            }

            // Fetch the list of files changed in the PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            // Check if any file is within the 'docs' folder
            const docsChanged = files.some(file => file.filename.startsWith('docs/'));
            return docsChanged;

      - name: Add label if not present
        if: steps.check-labels.outputs.result == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            if (!labels.includes('documentation')) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['documentation']
              })
            }

  check_no_include_code:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check for unprocessed include_code directives in versioned docs
        run: |
          if grep -r 'include_code' docs/versioned_docs/; then
            echo "::error::Found include_code directives in versioned_docs. See docs/README.md#cutting-a-new-version for how to correctly cut a versioned docs snapshot."
            exit 1
          fi

  build_preview:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: x86_64-unknown-linux-gnu
          cache-on-failure: false
          save-if: false

      - name: Install Repo Yarn's Dependencies
        uses: ./.github/actions/setup

      - uses: taiki-e/install-action@just

      # The NoirJS reference pages are generated by TypeDoc from `tooling/noir_js`,
      # which only re-exports symbols from these wasm/TS workspace packages. They
      # must be built first so their generated `.d.ts` files exist; otherwise
      # TypeDoc resolves every re-export to `any` and renders the broken
      # "Renames and re-exports" references reported in noir-lang/noir#12852.
      - name: Build packages whose types the NoirJS docs reference
        run: |
          just install-js-tools
          yarn workspace @noir-lang/types build
          yarn workspace @noir-lang/noirc_abi build
          yarn workspace @noir-lang/acvm_js build

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22.15.0'
          cache: 'yarn'
          cache-dependency-path: 'docs/yarn.lock'
      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Query active docs versions
        working-directory: docs
        run: yarn version::stables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs
        working-directory: docs
        env:
          ENV: staging # not really a secret, it will show in the footer anyway
        run: yarn build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs
          path: ./docs/build/
          retention-days: 3

  deploy_preview:
    needs: [build_preview, add_label]
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    if: needs.add_label.outputs.has_label == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download built docs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: docs
          path: ./docs/build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@d22a32a27c918fe470bbc562e984f80ec48c2668 # v4.0.0
        with:
          publish-dir: "./docs/build"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-github-deployment: false
          deploy-message: "Deploy from GitHub Actions for PR ${{ github.event.number }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1
