name: deny

on:
  push:
    branches: [master]
    paths: [Cargo.lock, .github/workflows/deny.yml]
  pull_request:
    branches: [master]
    paths: [Cargo.lock, .github/workflows/deny.yml]
  merge_group:

permissions: {}

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency: deny-${{ github.head_ref || github.run_id }}

jobs:
  deny:
    name: deny
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check all
