name: deny

on:
  push:
    branches: [master]
    paths: [Cargo.lock, .github/workflows/deny.yml]
  pull_request:
    branches: [master]
    paths: [Cargo.lock, .github/workflows/deny.yml]
  merge_group:

permissions: {}

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency: deny-${{ github.head_ref || github.run_id }}

jobs:
  deny:
    name: deny
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: EmbarkStudios/cargo-deny-action@175dc7fd4fb85ec8f46948fb98f44db001149081
        with:
          command: check all
