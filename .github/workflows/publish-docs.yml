name: Publish documentation

on:
  push:
    branches:
      - master
    paths: [docs/**]
  workflow_dispatch:

permissions: {}

jobs:
  publish-docs:
    name: Publish docs
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout release branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.15.0'
          cache: 'yarn'
          cache-dependency-path: 'docs/yarn.lock'

      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Query active docs versions
        working-directory: docs
        run: yarn version::stables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs for deploying
        working-directory: docs
        run: yarn build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@d22a32a27c918fe470bbc562e984f80ec48c2668 # v4.0.0
        with:
          publish-dir: "./docs/build"
          production-branch: master
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-github-deployment: false
          deploy-message: "Deploy from GitHub Actions for tag ${{ inputs.noir-ref }}"
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 1
