name: Publish documentation

on:
  push:
    branches:
      - master
    paths: [docs/**]
  workflow_dispatch:

permissions: {}

jobs:
  publish-docs:
    name: Publish docs
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout release branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.15.0'
          cache: 'yarn'
          cache-dependency-path: 'docs/yarn.lock'

      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Query active docs versions
        working-directory: docs
        run: yarn version::stables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs for deploying
        working-directory: docs
        run: yarn build

      - name: Deploy to Netlify
        run: |
          # Run from a directory outside the repository so netlify-cli does not
          # treat noir's package.json workspaces as a monorepo and prompt for a
          # project to deploy. The prebuilt docs are passed via an absolute --dir.
          cd "$(mktemp -d)"
          npx --yes netlify-cli@26.1.0 deploy \
            --dir "$GITHUB_WORKSPACE/docs/build" \
            --no-build \
            --prod \
            --message "Deploy from GitHub Actions for ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 15
