name: Publish documentation

on:
  push:
    branches:
      - master
    paths: [docs/**]
  workflow_dispatch:

permissions: {}

jobs:
  publish-docs:
    name: Publish docs
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout release branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22.15.0'
          cache: 'yarn'
          cache-dependency-path: 'docs/yarn.lock'

      - name: Install docs dependencies
        working-directory: docs
        run: yarn install --immutable

      - name: Query active docs versions
        working-directory: docs
        run: yarn version::stables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs for deploying
        working-directory: docs
        run: yarn build

      # Deploy with the Netlify CLI (not nwtgck/actions-netlify) so the markdown
      # content-negotiation edge function in netlify.toml is bundled and deployed.
      # --no-build: the site is already built above; do not re-run the build (no Rust
      # toolchain here). base="docs" in netlify.toml is resolved relative to the repo
      # root, so the edge-functions dir resolves correctly when run from docs/.
      - name: Deploy to Netlify
        working-directory: docs
        run: yarn netlify deploy --prod --no-build --dir build --message "Deploy from GitHub Actions for tag ${{ inputs.noir-ref }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10
