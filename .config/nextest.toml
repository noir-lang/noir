# Default profile for local testing. Other profiles are layered on top.
[profile.default]

[profile.ci]
# Do not cancel the test run on the first failure.
fail-fast = false
# Print nothing per-test as the run proceeds; report failures (with their
# captured output) only once, in the summary at the end.
status-level = "none"
failure-output = "final"

[profile.ci-master]
# Do not cancel the test run on the first failure.
fail-fast = false
# Run all tests.
default-filter = "all()"
# Print nothing per-test as the run proceeds; report failures (with their
# captured output) only once, in the summary at the end.
status-level = "none"
failure-output = "final"

[profile.merge-queue]
# fail fast to kick from merge queue faster.
fail-fast = true
# Disable fuzzing to avoid flakiness
default-filter = "not (package(noir_ast_fuzzer_fuzz) or test(arb_program_freqs_in_expected_range))"
# Print nothing per-test as the run proceeds; report failures (with their
# captured output) only once, in the summary at the end.
status-level = "none"
failure-output = "final"
