[package]
name = "noirc_driver"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
build-data.workspace = true

[dependencies]
clap.workspace = true
noirc_errors.workspace = true
noirc_frontend.workspace = true
noirc_evaluator.workspace = true
noirc_artifacts.workspace = true
noirc_abi.workspace = true
acvm.workspace = true
iter-extended.workspace = true
fm.workspace = true
rustc-hash.workspace = true
# `debug-embed` compiles the stdlib (the only `RustEmbed` asset) into the binary
# in debug builds too. Without it, debug builds read `noir_stdlib/src` from disk
# at the build-time path, so a debug `nargo` run away from its build tree finds no
# stdlib and panics in `prepare_crate` instead of compiling.
rust-embed = { workspace = true, features = ["debug-embed"] }
tracing.workspace = true

[dev-dependencies]
insta.workspace = true

[features]
bn254 = ["noirc_frontend/bn254", "noirc_evaluator/bn254"]
bls12_381 = ["noirc_frontend/bls12_381", "noirc_evaluator/bls12_381"]
